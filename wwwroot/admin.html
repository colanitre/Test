<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Fight Admin</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 12px; }
    .box { background: white; padding: 12px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
    label { display:inline-block; width:200px; font-weight:bold; margin-top: 4px; }
    input { width: 140px; margin: 4px 0; }
    button { margin-top: 8px; padding: 8px 12px; border:none; background:#007ACC; color:white; border-radius:5px; cursor:pointer; }
    button:hover { background:#005A9C; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
    th { background: #f4f7fa; }
    .muted { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>RPG Admin</h1>
  <a href="/">Back to fight</a>
  <div class="box">
    <h2>Damage Curve Config</h2>
    <button id="reloadConfig">Load config</button>
    <div id="curveEditor"></div>
  </div>
  <div class="box">
    <h2>Game Data</h2>
    <button id="reloadData">Reload players and enemies</button>
    <div class="muted" id="dataSummary">Loading...</div>
    <h3>Players</h3>
    <div id="playersContainer"></div>
    <h3>Enemies</h3>
    <div id="enemiesContainer"></div>
  </div>
  <div class="box">
    <h2>Tier Progression & God Enemies</h2>
    <div class="muted" id="tierSummary">Loading progression data...</div>
    <h3>Advanced Tier Classes</h3>
    <div id="tierClassesContainer"></div>
    <h3>Greek Gods & Other Godlike Enemies (Lv 1000+)</h3>
    <div id="godEnemiesContainer"></div>
  </div>
  <div class="box" id="status"></div>

<script>
  const status = document.getElementById('status');
  const log = (msg) => {
    const line = document.createElement('div');
    line.textContent = msg;
    status.prepend(line);
  };

  const fetchJson = async (url, options = {}) => {
    const resp = await fetch(url, options);
    const text = await resp.text();
    try { return JSON.parse(text); } catch { return text; }
  };

  // Keep this schema in sync with Models/DamageCurveConfig.cs
  const curveFields = [
    { key: 'CharacterAttackWeight', step: '0.01' },
    { key: 'CharacterMagicWeight', step: '0.01' },
    { key: 'CharacterSpeedWeight', step: '0.01' },
    { key: 'SkillAttackWeight', step: '0.01' },
    { key: 'SkillMagicWeight', step: '0.01' },
    { key: 'SkillSpeedWeight', step: '0.01' },
    { key: 'EnemyDefenseWeight', step: '0.01' },
    { key: 'EnemyMagicDefenseWeight', step: '0.01' },
    { key: 'EnemyStaminaDefenseWeight', step: '0.01' },
    { key: 'EnemyAttackWeight', step: '0.01' },
    { key: 'EnemyMagicWeight', step: '0.01' },
    { key: 'EnemySpeedWeight', step: '0.01' },
    { key: 'CharacterDefenseWeight', step: '0.01' },
    { key: 'CharacterMagicDefenseWeight', step: '0.01' },
    { key: 'CharacterStaminaDefenseWeight', step: '0.01' },
    { key: 'MinimumDamage', step: '1' }
  ];

  const getCurveValue = (cfg, pascalKey) => {
    if (cfg && Object.prototype.hasOwnProperty.call(cfg, pascalKey)) {
      return cfg[pascalKey];
    }
    const camelKey = pascalKey.charAt(0).toLowerCase() + pascalKey.slice(1);
    if (cfg && Object.prototype.hasOwnProperty.call(cfg, camelKey)) {
      return cfg[camelKey];
    }
    return 0;
  };

  const renderPlayers = (players) => {
    const container = document.getElementById('playersContainer');
    if (!Array.isArray(players) || players.length === 0) {
      container.innerHTML = '<div class="muted">No players found.</div>';
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Characters</th>
          </tr>
        </thead>
        <tbody>
          ${players.map(p => `
            <tr>
              <td>${p.id}</td>
              <td>${p.username}</td>
              <td>${p.email}</td>
              <td>${Array.isArray(p.characters) ? p.characters.length : 0}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  };

  const renderEnemies = (enemies) => {
    const container = document.getElementById('enemiesContainer');
    if (!Array.isArray(enemies) || enemies.length === 0) {
      container.innerHTML = '<div class="muted">No enemies found.</div>';
      return;
    }

    const sorted = [...enemies].sort((a, b) => b.level - a.level);
    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Type</th>
            <th>Level</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(e => `
            <tr>
              <td>${e.id}</td>
              <td>${e.name}</td>
              <td>${e.enemyClass?.name || '-'}</td>
              <td>${e.type}</td>
              <td>${e.level}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  };

  const renderTierClasses = (classes) => {
    const container = document.getElementById('tierClassesContainer');
    if (!Array.isArray(classes) || classes.length === 0) {
      container.innerHTML = '<div class="muted">No classes found.</div>';
      return;
    }

    const advanced = classes
      .filter(c => c.isAdvanced)
      .sort((a, b) => (a.tier - b.tier) || (a.archetype || '').localeCompare(b.archetype || '') || (a.branch - b.branch) || (a.name || '').localeCompare(b.name || ''));

    if (advanced.length === 0) {
      container.innerHTML = '<div class="muted">No advanced classes found.</div>';
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Archetype</th>
            <th>Tier</th>
            <th>Required Lv</th>
            <th>Branch</th>
            <th>Skills</th>
          </tr>
        </thead>
        <tbody>
          ${advanced.map(c => `
            <tr>
              <td>${c.id}</td>
              <td>${c.name}</td>
              <td>${c.archetype}</td>
              <td>${c.tier}</td>
              <td>${c.requiredLevel}</td>
              <td>${c.branch >= 0 ? c.branch + 1 : '-'}</td>
              <td>${c.skillCount}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  };

  const renderGodEnemies = (enemies) => {
    const container = document.getElementById('godEnemiesContainer');
    if (!Array.isArray(enemies) || enemies.length === 0) {
      container.innerHTML = '<div class="muted">No enemies found.</div>';
      return;
    }

    const godlikes = enemies
      .filter(e => e.type === 'Godlike' || e.level >= 1000)
      .sort((a, b) => b.level - a.level);

    if (godlikes.length === 0) {
      container.innerHTML = '<div class="muted">No godlike enemies (Lv 1000+) found.</div>';
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Type</th>
            <th>Level</th>
          </tr>
        </thead>
        <tbody>
          ${godlikes.map(e => `
            <tr>
              <td>${e.id}</td>
              <td>${e.name}</td>
              <td>${e.enemyClass?.name || '-'}</td>
              <td>${e.type}</td>
              <td>${e.level}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  };

  const refreshData = async () => {
    const [players, enemies, classes] = await Promise.all([
      fetchJson('/api/players'),
      fetchJson('/api/enemies'),
      fetchJson('/api/classes')
    ]);

    renderPlayers(players);
    renderEnemies(enemies);
    renderTierClasses(classes);
    renderGodEnemies(enemies);

    const playerCount = Array.isArray(players) ? players.length : 0;
    const enemyCount = Array.isArray(enemies) ? enemies.length : 0;
    const advancedClassCount = Array.isArray(classes) ? classes.filter(c => c.isAdvanced).length : 0;
    const godEnemyCount = Array.isArray(enemies) ? enemies.filter(e => e.type === 'Godlike' || e.level >= 1000).length : 0;
    document.getElementById('dataSummary').textContent = `Players: ${playerCount} | Enemies: ${enemyCount}`;
    document.getElementById('tierSummary').textContent = `Advanced classes: ${advancedClassCount} | Godlike/Lv1000+ enemies: ${godEnemyCount}`;
    log('Loaded players, enemies, and tier progression data.');
  };

  const refreshCurve = async () => {
    const cfg = await fetchJson('/api/fights/curve');
    const editor = document.getElementById('curveEditor');
    editor.innerHTML = '';
    for (const field of curveFields) {
      const key = field.key;
      const container = document.createElement('div');
      const label = document.createElement('label');
      label.textContent = key;
      const input = document.createElement('input');
      input.type = 'number';
      input.step = field.step;
      input.id = `curve_${key}`;
      input.value = getCurveValue(cfg, key);
      container.appendChild(label);
      container.appendChild(input);
      editor.appendChild(container);
    }
    const saveBtn = document.createElement('button');
    saveBtn.textContent = 'Save Curve';
    saveBtn.onclick = async () => {
      const update = {};
      for (const field of curveFields) {
        const key = field.key;
        const raw = document.getElementById(`curve_${key}`).value;
        update[key] = key === 'MinimumDamage' ? parseInt(raw, 10) : parseFloat(raw);
      }
      await fetch('/api/fights/curve', {
        method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(update)
      });
      log('Curve saved.');
    };
    editor.appendChild(saveBtn);
    log('Loaded config');
  };

  document.getElementById('reloadConfig').onclick = refreshCurve;
  document.getElementById('reloadData').onclick = refreshData;
  refreshCurve();
  refreshData();
</script>
</body>
</html>
