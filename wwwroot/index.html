<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Fight UI</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 12px; }
    .box { background: white; padding: 12px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.08); margin-bottom: 12px; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    label { font-weight: bold; display: block; margin-bottom: 4px; }
    select, input { width: 100%; padding: 8px; border: 1px solid #bbb; border-radius: 6px; }
    button { margin-top: 8px; padding: 8px 12px; border:none; background:#007ACC; color:white; border-radius:5px; cursor:pointer; }
    button:hover { background:#005A9C; }
    ul { margin: 0; padding-left: 18px; }
    .status { margin-top: 10px; color:#333; }
  </style>
  <style>
    .log-message { margin-bottom: 4px; padding: 2px 4px; border-radius: 3px; }
    .log-info { background: #e8f4fd; color: #333; }
    .log-player { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
    .log-enemy { background: #f8d7da; color: #721c24; border-left: 3px solid #dc3545; }
    .log-system { background: #fff3cd; color: #856404; border-left: 3px solid #ffc107; }
    .log-error { background: #f8d7da; color: #721c24; border-left: 3px solid #dc3545; font-weight: bold; }
    .log-time { color: #666; font-size: 11px; }
    .log-content { font-weight: normal; }
  </style>
</head>
<body>
  <a href="/admin.html" style="margin-top: 10px;">Admin</a>

  <div class="box">
    <div class="row">
      <div>
        <label for="playerSelect">Player</label>
        <select id="playerSelect"></select>
      </div>
      <div>
        <label for="characterSelect">Character</label>
        <select id="characterSelect"></select>
      </div>
      <div>
        <label for="enemySelect">Enemy</label>
        <select id="enemySelect"></select>
      </div>
    </div>
    <div class="status" id="setupStatus">Loading data...</div>
    <button id="startFight">Start Fight</button>
  </div>

  <div class="box" id="playerProfile" style="display:none;">
    <h3>Player Profile</h3>
    <p><strong>Username:</strong> <span id="profileUsername"></span></p>
    <p><strong>Email:</strong> <span id="profileEmail"></span></p>
    <h4>Characters</h4>
    <div id="profileCharacters"></div>
  </div>

  <div class="box" id="fightPanel" style="display:none;">
    <div class="row">
      <div>
        <label for="skillSelect">Skill</label>
        <select id="skillSelect"></select>
      </div>
      <div>
        <label for="moveInput">Move</label>
        <input type="text" id="moveInput" placeholder="Enter move" />
      </div>
    </div>
    <button id="attackButton">Attack</button>
    <button id="refreshSession">Refresh Session</button>
    <button id="clearLogButton">Clear Log</button>
    <div id="battleLog" style="width: 100%; height: 200px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; overflow-y: auto; background: #f9f9f9; font-family: monospace; font-size: 12px; line-height: 1.4;"></div>
  </div>

<script>
  const state = { players: [], enemies: [], currentCharacter: null, currentFight: null };

  const addLogMessage = (message, type = 'info') => {
    const logEl = document.getElementById('battleLog');
    const timestamp = new Date().toLocaleTimeString();
    const messageDiv = document.createElement('div');
    messageDiv.className = `log-message log-${type}`;
    messageDiv.innerHTML = `<span class="log-time">[${timestamp}]</span> <span class="log-content">${message}</span>`;
    logEl.appendChild(messageDiv);
    logEl.scrollTop = logEl.scrollHeight;
  };

  const log = (message) => addLogMessage(message, 'info');
  const logPlayer = (message) => addLogMessage(message, 'player');
  const logEnemy = (message) => addLogMessage(message, 'enemy');
  const logSystem = (message) => addLogMessage(message, 'system');
  const clearBattleLog = () => {
    document.getElementById('battleLog').innerHTML = '';
  };

  const fetchJson = async (url, options = {}) => {
    try {
      const res = await fetch(url, options);
      return await res.json();
    } catch (e) {
      logError('Fetch error: ' + e.message);
      return null;
    }
  };

  const logError = (message) => addLogMessage(message, 'error');

  const loadPlayers = async () => {
    const players = await fetchJson('/api/players');
    if (!Array.isArray(players)) {
      logError('Failed to load players');
      return;
    }
    state.players = players;
    const select = document.getElementById('playerSelect');
    select.innerHTML = '<option value="">Select player</option>' + players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    document.getElementById('setupStatus').textContent = 'Players loaded.';
  };

  const loadEnemies = async () => {
    const enemies = await fetchJson('/api/enemies');
    if (!Array.isArray(enemies)) {
      logError('Failed to load enemies');
      return;
    }
    state.enemies = enemies;
    const select = document.getElementById('enemySelect');
    select.innerHTML = '<option value="">Select enemy</option>' + enemies.map(e => `<option value="${e.id}">${e.name} (${e.type}, Lv${e.level})</option>`).join('');
  };

  const loadPlayerProfile = async (playerId) => {
    if (!playerId) {
      document.getElementById('playerProfile').style.display = 'none';
      return;
    }
    const player = await fetchJson(`/api/players/${playerId}`);
    if (!player) {
      logError('Failed to load player profile');
      return;
    }
    document.getElementById('profileUsername').textContent = player.username;
    document.getElementById('profileEmail').textContent = player.email;
    const charsDiv = document.getElementById('profileCharacters');
    charsDiv.innerHTML = player.characters.map(c => `
      <div style="border: 1px solid #ccc; padding: 8px; margin-bottom: 8px; border-radius: 4px;">
        <strong>${c.name}</strong> (Level ${c.level}) - ${c.class}<br>
        Health: ${c.health}, Mana: ${c.mana}, Experience: ${c.experience}<br>
        ${c.description || 'No description'}
      </div>
    `).join('');
    document.getElementById('playerProfile').style.display = 'block';
  };

  const loadCharacters = async (playerId) => {
    if (!playerId) {
      document.getElementById('characterSelect').innerHTML = '<option value="">Select player first</option>';
      return;
    }
    const chars = await fetchJson(`/api/players/${playerId}/characters`);
    const select = document.getElementById('characterSelect');
    if (!Array.isArray(chars)) {
      select.innerHTML = '<option value="">Could not load characters</option>';
      logError('Failed to load characters: ' + JSON.stringify(chars));
      return;
    }
    select.innerHTML = '<option value="">Select character</option>' + chars.map(c => `<option value="${c.id}" data-name="${c.name}">${c.name} (Lv${c.level})</option>`).join('');
    document.getElementById('setupStatus').textContent = `Characters loaded for player ${playerId}.`;
  };

  const loadSkills = async (playerId, characterId) => {
    const skillSelect = document.getElementById('skillSelect');
    if (!playerId || !characterId) {
      skillSelect.innerHTML = '<option value="">Choose character first</option>';
      return;
    }
    const character = await fetchJson(`/api/players/${playerId}/characters/${characterId}`);
    if (!character || !Array.isArray(character.skills)) {
      skillSelect.innerHTML = '<option value="">Skills not available</option>';
      return;
    }
    state.currentCharacter = character;
    skillSelect.innerHTML = '<option value="">Select skill</option>' + character.skills.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  };

  const startFight = async () => {
    const playerId = document.getElementById('playerSelect').value;
    const characterId = document.getElementById('characterSelect').value;
    const enemyId = document.getElementById('enemySelect').value;
    if (!playerId || !characterId || !enemyId) {
      logError('Choose player, character, and enemy first');
      return;
    }
    const payload = { playerId: parseInt(playerId), characterId: parseInt(characterId), enemyId: parseInt(enemyId) };
    const result = await fetch('/api/fights/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!result.ok) {
      logError('Failed to start fight');
      return;
    }
    const fight = await result.json();
    state.currentFight = fight;
    document.getElementById('fightPanel').style.display = 'block';
    clearBattleLog();
    logSystem('⚔️ Fight started! ⚔️');
    loadSkills(playerId, characterId);
  };

  // Event listeners
  document.getElementById('playerSelect').addEventListener('change', (e) => {
    loadCharacters(e.target.value);
    loadPlayerProfile(e.target.value);
  });
  document.getElementById('characterSelect').addEventListener('change', (e) => {
    const pid = document.getElementById('playerSelect').value;
    const cid = e.target.value;
    loadSkills(pid, cid);
  });
  document.getElementById('startFight').addEventListener('click', startFight);
  document.getElementById('attackButton').addEventListener('click', async () => {
    const skillId = document.getElementById('skillSelect').value;
    const move = document.getElementById('moveInput').value;
    if (!skillId) {
      logError('Select skill first');
      return;
    }
    const playerId = document.getElementById('playerSelect').value;
    const payload = { PlayerId: parseInt(playerId), SkillId: parseInt(skillId) };
    const result = await fetch(`/api/fights/${state.currentFight.id}/turn`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!result.ok) {
      logError('Attack failed');
      return;
    }
    const response = await result.json();
    
    // Log the moves from this turn
    if (response.moves && Array.isArray(response.moves)) {
      response.moves.forEach(move => {
        if (move.isPlayer) {
          logPlayer(`🎯 ${move.description}`);
        } else {
          logEnemy(`👹 ${move.description}`);
        }
      });
    }
    
    // Check for victory/defeat
    if (response.status === 'Completed') {
      if (response.isVictory) {
        logSystem('🎉 VICTORY! You defeated the enemy! 🎉');
        // Refresh player profile after victory
        const playerId = document.getElementById('playerSelect').value;
        loadPlayerProfile(playerId);
        loadCharacters(playerId);
      } else {
        logSystem('💀 DEFEAT! You were defeated... 💀');
      }
    }
  });
  document.getElementById('refreshSession').addEventListener('click', async () => {
    if (!state.currentFight) return;
    const session = await fetchJson(`/api/fights/${state.currentFight.id}`);
    if (!session) {
      logError('Failed to refresh session');
      return;
    }
    logSystem('🔄 Session refreshed');
    // Could add more detailed status display here if needed
  });
  document.getElementById('clearLogButton').addEventListener('click', clearBattleLog);

  // Init
  loadPlayers();
  loadEnemies();
</script>
</body>
</html>
